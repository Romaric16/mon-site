<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Produits</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>GAM'S AVENUE</h1>
    <nav>
        <a href="index.html">Accueil</a>
        <a href="produits.html">Produits</a>
        <button onclick="voirPanier()">🛒 Panier (<span id="cart-count">0</span>)</button>
    </nav>
</header>

<main>
    <h2>Nos vêtements</h2>

    <div class="products">

        <div class="product">
            <h3>T-shirt</h3>
            <p>20€</p>
            <button onclick="ajouterAuPanier('T-shirt', 20)">Ajouter</button>
        </div>

        <div class="product">
            <h3>Jean</h3>
            <p>40€</p>
            <button onclick="ajouterAuPanier('Jean', 40)">Ajouter</button>
        </div>

        <div class="product">
            <h3>Veste</h3>
            <p>60€</p>
            <button onclick="ajouterAuPanier('Veste', 60)">Ajouter</button>
        </div>

    </div>

    <!-- Panier -->
    <div id="panier" class="panier hidden">
        <h2>Mon Panier</h2>
        <ul id="panier-items"></ul>
        <p id="total"></p>
        <button onclick="viderPanier()">Vider le panier</button>
        <button onclick="fermerPanier()">Fermer</button>
    </div>

</main>

<script src="produits.js"></script>
</body>
</html>
