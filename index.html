<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gam's Avenue</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    
    <header>
        <div class="logo">
            <img src="logo.jpg" alt="Logo">
            <h1>GAM'S AVENUE</h1>
        </div>

        <nav>
            <button onclick="showLogin()">Connexion</button>
            <button onclick="showRegister()">Inscription</button>
        </nav>
    </header>

    <main>
        <!-- pour la Connexion -->
         <section id="loginForm" class="form-container">
            <h2>Connexion</h2>
            <input type="email" id="loginEmail" placeholder="Email">
            <p id="loginEmailError" class="error"></p>

            <input type="password" id="loginPasseword" placeholder="Mot de Passe">
            <button>Se Connecter</button>
         </section>

         <!-- pour l'inscription -->
         <section id="registerForm" class="form-container hidden">
            <h2>Inscription</h2>
            <input type="text" id="registerName" placeholder="Nom">

            <input type="email" id="registerEmail" placeholder="Email">
            <p id="registerEmailError" class="error"></p>

            <input type="password" id="registerPassword" placeholder="Mot de Passe">
            <p id="registerPasswordError" class="error"></p>
            <button onclick="validerInscription()">S'inscrire</button>
         </section>
    </main>
<a href="produits.html">Voir les produits</a>
    <script src = "script.js"></script>
</body>

</html>
